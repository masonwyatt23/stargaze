name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          # Stub values so the build doesn't crash on missing env.
          # Vercel's deployed builds use the real ones.
          NEXT_PUBLIC_SITE_URL: https://stargaze-evero.vercel.app
          NEXT_PUBLIC_SITE_NAME: Stargaze
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          GITHUB_TOKEN_ENCRYPTION_KEY: cGxhY2Vob2xkZXItMzItYnl0ZS1lbmNyeXB0aW9uLWtleQ==
